<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>미래에셋 AI 패밀리 · 발표자료 다운로드</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%A7%99%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --bg:#0B1120; --surface:#141E36; --surface2:#1A2440; --ink:#F5F8FF; --muted:#C7D0E6; --faint:#8B96B6;
    --border:#24314F; --border2:#35476E; --accent:#FF9A57; --accent-fill:#F5813C; --accent-soft:rgba(245,129,60,.14);
  }
  @media (prefers-color-scheme:light){:root{
    --bg:#EEF1F7; --surface:#FFFFFF; --surface2:#F1F4FA; --ink:#141D33; --muted:#4E5872; --faint:#838DA6;
    --border:#DCE2EE; --border2:#C3CBDD; --accent:#D9540F; --accent-fill:#F37021; --accent-soft:#FBE7D9;}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--font);
    -webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:32px;
    background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:26px 26px}
  @media (prefers-color-scheme:light){body{background-image:radial-gradient(rgba(20,29,51,.05) 1px,transparent 1px)}}
  .wrap{width:100%;max-width:560px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
    font-weight:700;display:flex;align-items:center;gap:9px;margin:0 0 14px}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--accent-fill)}
  h1{font-size:clamp(26px,5vw,38px);line-height:1.1;letter-spacing:-.02em;font-weight:800;margin:0 0 8px}
  .sub{color:var(--muted);font-size:15px;line-height:1.6;margin:0 0 26px}
  .cards{display:flex;flex-direction:column;gap:14px}
  a.dl{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:18px 20px;text-decoration:none;color:inherit;box-shadow:0 8px 28px rgba(0,0,0,.18);
    transition:transform .15s,border-color .15s,box-shadow .15s}
  a.dl:hover{transform:translateY(-3px);border-color:var(--accent-fill);box-shadow:0 14px 34px rgba(0,0,0,.28)}
  a.dl .ic{width:46px;height:46px;flex:0 0 auto;border-radius:12px;display:grid;place-items:center;font-size:22px;
    background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent-fill) 40%,transparent)}
  a.dl .tx{flex:1;min-width:0}
  a.dl .nm{font-weight:700;font-size:16px}
  a.dl .ds{color:var(--muted);font-size:13px;margin-top:2px;line-height:1.4}
  a.dl .arw{color:var(--accent);font-family:var(--mono);font-weight:800;font-size:18px}
  .open{display:inline-flex;align-items:center;gap:8px;margin-top:22px;color:var(--accent);text-decoration:none;
    font-size:14px;font-weight:600}
  .open:hover{text-decoration:underline}
  .foot{margin-top:26px;color:var(--faint);font-family:var(--mono);font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">MALife-AI · 미래에셋 AI 패밀리</p>
    <h1>발표자료 다운로드</h1>
    <p class="sub">핵심 3종 소개부터 업계 비교·로드맵·배포 계획까지 13슬라이드. 원하는 형식으로 내려받으세요.</p>
    <div class="cards">
      <a class="dl" href="core-roadmap.pdf" download="미래에셋-AI패밀리-발표자료.pdf">
        <span class="ic">📄</span>
        <span class="tx"><span class="nm">PDF (16:9 · 다크)</span><span class="ds">인쇄·이메일·배포용 정적 문서 · 13페이지</span></span>
        <span class="arw">↓</span>
      </a>
      <a class="dl" href="core-roadmap.html" download="미래에셋-AI패밀리-발표자료.html">
        <span class="ic">🧙</span>
        <span class="tx"><span class="nm">HTML (오프라인 인터랙티브)</span><span class="ds">트랜지션·스파클 내장 단일 파일 · 인터넷 없이 실행</span></span>
        <span class="arw">↓</span>
      </a>
    </div>
    <a class="open" href="core-roadmap.html">▶ 브라우저에서 바로 보기</a>
    <p class="foot">미래에셋생명 · AI혁신팀</p>
  </div>
</body>
</html>
